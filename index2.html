        document.addEventListener('DOMContentLoaded', () => {

                window.scrollTo({ top: 0, behavior: 'smooth' });
                
                const targetHref = event.currentTarget.href;
                if (targetHref) {
                    setTimeout(() => window.location.href = targetHref, 100);
                }
            };
            const menuItems = document.querySelectorAll('._Profile_bar_menu_1, ._Profile_bar_menu_2, ._Profile_bar_menu_3');
            if (menuItems.length > 0) {
                menuItems.forEach(item => item.addEventListener('click', handleMenuClick));
