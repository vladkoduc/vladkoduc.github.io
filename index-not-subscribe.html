            mainButton.show();
            mainButton.onClick(() => {

            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'hidden') {

                } else {

                }
            });
            window.addEventListener('beforeunload', () => {
                mainButton.hide(); 
            });
