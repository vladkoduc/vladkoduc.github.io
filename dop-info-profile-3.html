            <div class="subscription-approved2">Что бы приобрести личную консультацию, нажмите на кнопку ниже «Приобрести консультацию».</div>
        </section>
    </div>
    <script>
        if (typeof Telegram !== 'undefined' && Telegram.WebApp) {
            const mainButton = Telegram.WebApp.MainButton;
            mainButton.text = "Приобрести консультацию";
            mainButton.hasShineEffect = true;
            mainButton.setParams({
                color: "#ffcc00",
                text_color: "#fff"
            });
            mainButton.show();
            mainButton.onClick(() => {
                Telegram.WebApp.openLink('https://t.me/tribute');
            });
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'hidden') {
                    mainButton.hide();
                } else {
                    mainButton.show();
                }
            });
            window.addEventListener('beforeunload', () => {
                mainButton.hide(); 
            });
        }
    </script>
