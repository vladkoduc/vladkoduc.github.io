<!DOCTYPE html>
<html lang="en">  
<head>      
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Content | informatoin-Profile_2</title>
    <script src="discovery-logic-mini-app.js"></script>
    <script src="logic-style-bottom-top-background.js"></script>
    <script src="dop-info.js"></script>
    <script src="transition.js"></script>
    <link rel="stylesheet" href="styles_text.css"> 
    <link rel="stylesheet" href="dop-info.css"> 
    <link rel="stylesheet" href="not-button-style-up.css"> 
    <link rel="stylesheet" href="text-bar-not-button.css"> 
    <style> 
        body {
            margin: 0;
            padding: 0;
            background-color: var(--tg-theme-secondary-bg-color); 
            color: var(--tg-theme-text-color);
            display: flex;
            flex-direction: column;
            height: 100vh; 
            overflow: hidden; 
            user-select: none; 
            -webkit-user-select: none; 
            -ms-user-select: none; 
        }
        * {
            pointer-events: auto; 
        }
        img, a, input, textarea {
            pointer-events: auto; 
        }
        .content {
            margin-top: 0px;
            flex: 1; 
            overflow-y: auto; 
        }
    </style>
</head>
<body>
    <div class="content">
        <section class="_Profile-dop-info-3_">
            <section class="_Profile_bar-not_button_1">Личная консультация</section>
            <section class="rectangle6">
                <div class="dop-info-text2">У вас нет консультаций</div>
            </section>
            <div class="subscription-approved2">Что бы приобрести личную консультацию, нажмите на кнопку ниже «Приобрести консультацию».</div>
        </section>
    </div>
    <script>
        if (typeof Telegram !== 'undefined' && Telegram.WebApp) {
            const mainButton = Telegram.WebApp.MainButton;
            mainButton.text = "Приобрести консультацию";
            mainButton.hasShineEffect = true;
            mainButton.setParams({
                color: "#ffcc00",
                text_color: "#fff"
            });
            mainButton.show();
            mainButton.onClick(() => {
                Telegram.WebApp.openLink('https://t.me/tribute');
            });
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'hidden') {
                    mainButton.hide();
                } else {
                    mainButton.show();
                }
            });
            window.addEventListener('beforeunload', () => {
                mainButton.hide(); 
            });
        }
    </script>         
</body>
</html>
